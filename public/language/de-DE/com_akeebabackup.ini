COM_AKEEBABACKUP_PUSH_ENDBACKUP_WARNINGS_BODY="Akeeba Backup hat das Backup Ihrer Website „%s" unter %s am %s abgeschlossen, aber Warnungen wurden ausgegeben. Dies könnte bedeuten, dass Dateien nicht gesichert wurden oder, wenn Sie das Backup automatisch in den entfernten Speicher hochladen, der Upload möglicherweise fehlgeschlagen ist.\nSie müssen die Warnungen überprüfen und sicherstellen, dass Ihr Backup erfolgreich abgeschlossen wurde. Wir empfehlen, ein Backup, bei dem Warnungen ausgegeben wurden, immer zu testen, um sicherzustellen, dass es ordnungsgemäß funktioniert. Sie können dies tun, indem Sie es auf einem lokalen Server wiederherstellen. Denken Sie daran: Ein ungetestetes Backup ist so gut wie kein Backup."
