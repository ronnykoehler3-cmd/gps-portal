COM_AKEEBABACKUP_PUSH_ENDBACKUP_WARNINGS_BODY="Akeeba Backup a terminé la sauvegarde de votre site « %s » situé dans %s le %s, mais des avertissements ont été émis. Cela peut signifier que certains fichiers n'ont pas été sauvegardés ou, si vous téléversez automatiquement la sauvegarde vers un stockage distant, que le téléversement a échoué.\nVous devez examiner les avertissements et vous assurer que votre sauvegarde s'est terminée avec succès. Nous vous conseillons de toujours tester une sauvegarde ayant généré des avertissements afin de vérifier qu'elle fonctionne correctement. Vous pouvez le faire en la restaurant sur un serveur local. N'oubliez pas qu'une sauvegarde non testée ne vaut pas mieux qu'une absence de sauvegarde."
