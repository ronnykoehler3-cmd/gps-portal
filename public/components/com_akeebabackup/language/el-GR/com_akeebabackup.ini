COM_AKEEBABACKUP_PUSH_ENDBACKUP_WARNINGS_BODY="Το Akeeba Backup ολοκλήρωσε τη δημιουργία αντιγράφου ασφαλείας του ιστότοπού σας \"%s\" που βρίσκεται στο %s στις %s, αλλά εκδόθηκαν προειδοποιήσεις. Αυτό μπορεί να σημαίνει ότι ορισμένα αρχεία δεν δημιουργήθηκε αντίγραφο ή, εάν αποστέλλεται αυτόματα το αντίγραφο σε απομακρυσμένη αποθήκευση, η αποστολή μπορεί να έχει αποτύχει.\nΠρέπει να αναθεωρήσετε τις προειδοποιήσεις και να βεβαιωθείτε ότι το αντίγραφο ασφαλείας έχει ολοκληρωθεί επιτυχώς. Σας συνιστούμε πάντα να δοκιμάζετε ένα αντίγραφο ασφαλείας που προέκυψε με προειδοποιήσεις για να βεβαιωθείτε ότι λειτουργεί σωστά. Μπορείτε να το κάνετε επαναφέροντάς το σε έναν τοπικό διακομιστή. Θυμηθείτε ότι ένα μη δοκιμασμένο αντίγραφο ασφαλείας είναι τόσο καλό όσο και κανένα."
