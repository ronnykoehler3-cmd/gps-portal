PLG_QUICKICON_AKEEBABACKUP="Schnellsymbol - Akeeba Backup Benachrichtigung"
PLG_QUICKICON_AKEEBABACKUP_XML_DESCRIPTION="Zeigt ein Akeeba Backup-Symbol in Ihrem Administrator-Backend an und benachrichtigt Sie, wenn ein Backup überfällig ist (konfigurierbar)."

PLG_QUICKICON_AKEEBABACKUP_GROUP_DESC="Die Gruppe dieses Plugins (dieser Wert wird mit dem Gruppenwert verglichen, der in <strong>Schnellsymbole</strong>-Modulen verwendet wird, um Symbole einzufügen)"
PLG_QUICKICON_AKEEBABACKUP_GROUP_LABEL="Gruppe"

PLG_QUICKICON_AKEEBABACKUP_LBL_WARNINGS="Warnsymbol aktivieren"
PLG_QUICKICON_AKEEBABACKUP_DESC_WARNINGS="Wenn aktiviert, zeigt das Akeeba Backup-Logo-Symbol ein kleines Warnzeichen an, wenn das Backup fehlgeschlagen oder veraltet ist (siehe unten)."
PLG_QUICKICON_AKEEBABACKUP_LBL_WARNFAILED="Bei fehlgeschlagenen Backups warnen"
PLG_QUICKICON_AKEEBABACKUP_DESC_WARNFAILED="Wenn sowohl diese als auch die vorherige Option aktiviert sind, wird ein Warnsymbol angezeigt, wenn das letzte Backup fehlgeschlagen ist."
PLG_QUICKICON_AKEEBABACKUP_LBL_PERIOD="Veraltete Backup-Zeit in Stunden"
PLG_QUICKICON_AKEEBABACKUP_DESC_PERIOD="Ein Backup gilt als veraltet, wenn seit dem letzten erfolgreichen Backup diese Anzahl von Stunden vergangen ist. Wenn das Backup veraltet ist, wird ein Warnsymbol angezeigt, wenn die erste Option aktiviert ist."

PLG_QUICKICON_AKEEBABACKUP_PROFILE_LABEL="Backup-Profil"
PLG_QUICKICON_AKEEBABACKUP_PROFILE_DESC="Wählen Sie das Backup-Profil aus, das für ein vollständiges Website-Backup verwendet wird, wenn auf das Backup-Symbol geklickt wird."
