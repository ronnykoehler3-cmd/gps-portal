COM_AKEEBABACKUP_SCHEDULE_LBL_FRONTEND_WEBCRON_THENCLICKSUBMIT="Klicken Sie abschließend auf die Schaltfläche „Senden", um die Einrichtung Ihres CRON-Auftrags abzuschließen."
