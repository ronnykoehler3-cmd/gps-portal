COM_AKEEBABACKUP_SCHEDULE_LBL_FRONTENDBACKUP_TAB_URL="URL"
COM_AKEEBABACKUP_SCHEDULE_LBL_FRONTENDBACKUP_TAB_WEBCRON="WebCron.org"
COM_AKEEBABACKUP_SCHEDULE_LBL_FRONTENDBACKUP_TAB_WGET="WGet"
