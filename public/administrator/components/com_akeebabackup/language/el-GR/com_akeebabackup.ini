COM_AKEEBABACKUP_CPANEL_LBL_STATUS_WARNING="Το Akeeba Backup είναι έτοιμο να δημιουργήσει αντίγραφο ασφαλείας του ιστότοπού σας, αλλά υπάρχουν πιθανά προβλήματα"
