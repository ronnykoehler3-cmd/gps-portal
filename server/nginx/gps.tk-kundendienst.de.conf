server {
    server_name gps.tk-kundendienst.de;

    root /var/www/gps/public;
    index index.php index.html index.htm;

    access_log /var/log/nginx/gps-access.log;
    error_log /var/log/nginx/gps-error.log;

    # Traccar Client-App:
    # Die Android-App sendet als ktor-client direkt per POST an "/".
    error_page 418 = @traccar_client;

    location = / {
        if ($http_user_agent ~* "^ktor-client") {
            return 418;
        }

        try_files $uri $uri/ /index.php?$args;
    }

    location @traccar_client {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;

        proxy_set_header Host traccar.tk-kundendienst.de;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_buffering off;
        proxy_request_buffering off;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Optionaler Traccar-Client-Pfad
    location /client-proxy/ {
        proxy_pass http://127.0.0.1:8082/client-proxy/;
        proxy_http_version 1.1;

        proxy_set_header Host traccar.tk-kundendienst.de;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/gps.tk-kundendienst.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gps.tk-kundendienst.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name gps.tk-kundendienst.de;

    return 301 https://$host$request_uri;
}
